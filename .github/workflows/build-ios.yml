name: Build AlefTaya IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install ldid (For TrollStore)
        run: brew install ldid

      - name: Build Xcode Project
        run: |
          mkdir -p build
          xcodebuild -project GoogleFrontProxy.xcodeproj \
            -scheme GoogleFrontProxy \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=15.0

      - name: Nuclear Injection & Create IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/GoogleFrontProxy.app Payload/
          
          # ۱. دادن دسترسی اجرایی به هسته Rust
          chmod +x Payload/GoogleFrontProxy.app/MasterHttpRelay-iOS
          
          # ۲. امضای خود باینری Rust (برای جلوگیری از کرش داخلی iOS)
          ldid -S Payload/GoogleFrontProxy.app/MasterHttpRelay-iOS
          
          # ۳. ساخت فایل تنظیمات قدرتمند TrollStore مستقیماً در سرور
          cat << 'EOF' > troll.entitlements
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>platform-application</key>
              <true/>
              <key>com.apple.private.security.no-sandbox</key>
              <true/>
          </dict>
          </plist>
          EOF
          
          # ۴. تزریق اجباری کدهای بالا به اپلیکیشن اصلی aleftaya
          ldid -Stroll.entitlements Payload/GoogleFrontProxy.app/GoogleFrontProxy
          
          zip -r aleftaya_proxy.ipa Payload
          
      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: aleftaya-proxy-ios
          path: aleftaya_proxy.ipa
